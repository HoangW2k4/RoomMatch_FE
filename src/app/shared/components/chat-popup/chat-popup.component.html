<div class="chat-root">

  <!-- Open chat windows -->
  <div *ngFor="let conv of openConversations" class="chat-window">

    <!-- Header -->
    <div class="cw-header">
      <div class="cw-header-left">
        <div class="cw-avatar-wrap">
          <img [src]="conv.partnerAvatar" class="cw-avatar" [alt]="conv.partnerName" title="{{conv.partnerName}}" />
          <span class="cw-status-dot" *ngIf="conv.isOnline"></span>
        </div>
        <div class="cw-user-info">
          <span class="cw-name">{{ conv.partnerName }}</span>
          <span class="cw-online-status" *ngIf="conv.isOnline">Active now</span>
        </div>
      </div>
      <div class="cw-header-actions" (click)="$event.stopPropagation()">
        <!-- Video call -->
        <button class="cw-icon-btn" title="Gọi video">
          <svg viewBox="0 0 24 24" fill="currentColor" width="19" height="19">
            <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z" />
          </svg>
        </button>
        <!-- Minimize -->
        <button class="cw-icon-btn" title="Ẩn" (click)="hideChat(conv)">
          <svg viewBox="0 0 24 24" fill="currentColor" width="19" height="19">
            <path d="M19 13H5v-2h14v2z" />
          </svg>
        </button>
        <!-- Close -->
        <button class="cw-icon-btn cw-close-btn" title="Đóng" (click)="closeChat(conv, $event)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Reply context -->
    <div class="cw-reply-context" *ngIf="conv.replyToPost">
      Đang trả lời <a class="cw-post-link" href="#" (click)="$event.preventDefault()">{{ conv.replyToPost }}</a>
    </div>

    <!-- Messages area -->
    <div class="cw-messages" #msgContainer>
      <div class="cw-date-sep"><span>Hôm nay</span></div>

      <ng-container *ngFor="let msg of conv.messages; let i = index">
        <!-- Received -->
        <div *ngIf="!msg.isSent" class="cw-row cw-row--received">
          <img [src]="conv.partnerAvatar" class="cw-msg-avatar" [alt]="conv.partnerName" title="{{conv.partnerName}}" />
          <div class="cw-bubble cw-bubble--received">{{ msg.text }}</div>
        </div>
        <!-- Sent -->
        <div *ngIf="msg.isSent" class="cw-row cw-row--sent">
          <div class="cw-bubble cw-bubble--sent">{{ msg.text }}</div>
        </div>
      </ng-container>
    </div>

    <!-- Input area -->
    <div class="cw-input-area">
      <button class="cw-tool-btn" title="Thêm">
        <svg viewBox="0 0 24 24" fill="currentColor" width="21" height="21">
          <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
        </svg>
      </button>
      <button class="cw-tool-btn" title="Hình ảnh">
        <svg viewBox="0 0 24 24" fill="currentColor" width="21" height="21">
          <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" />
        </svg>
      </button>
      <button class="cw-tool-btn" title="Sticker">
        <svg viewBox="0 0 24 24" fill="currentColor" width="21" height="21">
          <path
            d="M11.5 2C6.81 2 3 5.81 3 10.5S6.81 19 11.5 19h.5v3c4.86-2.34 8-7 8-11.5C20 5.81 16.19 2 11.5 2zm1 14.5h-2v-2h2v2zm0-4h-2c0-3.25 3-3 3-5 0-1.1-.9-2-2-2s-2 .9-2 2h-2c0-2.21 1.79-4 4-4s4 1.79 4 4c0 2.5-3 2.75-3 5z" />
        </svg>
      </button>
      <button class="cw-tool-btn cw-gif-btn" title="GIF">GIF</button>

      <div class="cw-input-wrap">
        <input type="text" class="cw-input" placeholder="Aa" [(ngModel)]="conv.inputText"
          (keyup.enter)="sendMessage(conv)" />
        <button class="cw-emoji-btn" title="Biểu tượng cảm xúc">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path
              d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z" />
          </svg>
        </button>
      </div>

      <!-- Thumbs up / Send -->
      <button class="cw-send-btn" title="Gửi" (click)="sendMessage(conv)" [class.cw-send-btn--active]="conv.inputText">
        <!-- Send arrow (when text) -->
        <svg *ngIf="conv.inputText" viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
        </svg>
        <!-- Thumbs up (when empty) -->
        <svg *ngIf="!conv.inputText" viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
          <path
            d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z" />
        </svg>
      </button>
    </div>

  </div>

  <!-- FAB: partner avatar toggles chat -->
  <div class="chat-fab-col" *ngIf="firstConversation as conv">
    <button class="fab-user-avatar-wrap" title="Mở/đóng hội thoại" (click)="toggleChat(conv)">
      <img [src]="conv.partnerAvatar" class="fab-user-avatar" [alt]="conv.partnerName" title="{{conv.partnerName}}" />
      <span class="fab-online-dot" *ngIf="conv.isOnline"></span>
      <span class="fab-badge" *ngIf="!conv.isOpen && conv.unreadCount > 0">
        {{ conv.unreadCount }}
      </span>
    </button>
  </div>

</div>
