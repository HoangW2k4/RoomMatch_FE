<form (ngSubmit)="onSubmit()">
  <div class="mb-3">
    <h4 class="fw-bold mb-2">Khôi phục mật khẩu</h4>
    <p class="text-muted small">Nhập email và mật khẩu mới của bạn. Mã OTP sẽ được gửi để xác thực.</p>
  </div>

  <!-- Email -->
  <app-input-text
    label="Email"
    type="email"
    placeholder="name@company.com"
    [(ngModel)]="forgotPasswordData.email"
    name="email"
    [required]="true"
  ></app-input-text>

  <!-- New Password -->
  <app-input-text
    label="Mật khẩu mới"
    type="password"
    placeholder="Nhập mật khẩu mới"
    [(ngModel)]="forgotPasswordData.newPassword"
    name="newPassword"
    [required]="true"
  ></app-input-text>

  <!-- Confirm Password -->
  <app-input-text
    label="Xác nhận mật khẩu mới"
    type="password"
    placeholder="Xác nhận mật khẩu mới của bạn"
    [(ngModel)]="forgotPasswordData.confirmPassword"
    name="confirmPassword"
    [required]="true"
  ></app-input-text>

  <!-- Password mismatch warning -->
  @if (isPasswordMismatch) {
    <div class="alert alert-danger py-2 px-3 mb-3" role="alert">
      <small>Mật khẩu không khớp!</small>
    </div>
  }

  <button 
    type="submit" 
    class="btn btn-primary w-100 py-2 fw-semibold mb-3"
    [disabled]="isPasswordMismatch">
    Tiếp tục
  </button>

  <!-- Back to Sign In -->
  <div class="text-center">
    <button 
      type="button"
      class="btn btn-link text-primary text-decoration-none fw-semibold"
      (click)="onBackToSignIn()">
      ← Quay lại đăng nhập
    </button>
  </div>
</form>
