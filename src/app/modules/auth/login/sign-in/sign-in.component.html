<form (ngSubmit)="onSubmit()">
  <!-- Email -->
  <app-input-text
    label="Email"
    type="email"
    placeholder="name@company.com"
    [(ngModel)]="signInData.email"
    name="email"
    [required]="true"
  ></app-input-text>

  <!-- Password -->
  <app-input-text
    label="Mật khẩu"
    type="password"
    placeholder="Nhập mật khẩu của bạn"
    [(ngModel)]="signInData.password"
    name="password"
    [required]="true"
  ></app-input-text>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="rememberMe" [(ngModel)]="rememberMe" name="rememberMe">
      <label class="form-check-label" for="rememberMe">
        Ghi nhớ đăng nhập
      </label>
    </div>
    <a (click)="onForgotPassword()" class="text-primary text-decoration-none fw-semibold link-clickable">Quên mật khẩu?</a>
  </div>

  <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Đăng nhập</button>
</form>

<!-- Social Login -->
<div class="mt-4">
  <div class="text-center text-muted mb-3 position-relative divider-line">
    <span class="bg-white px-2 position-relative divider-text">Hoặc tiếp tục với</span>
    <hr class="position-absolute top-50 start-0 w-100 divider-hr">
  </div>
  <div class="d-flex gap-2">
    <button type="button" class="btn btn-outline-secondary flex-fill btn-social-login" (click)="onSignInWithGoogle()">
      <img src="assets/icons/ic_google.png" alt="Google" width="18" height="18" class="me-2">
      Google
    </button>
    <button type="button" class="btn btn-outline-secondary flex-fill btn-social-login" (click)="onSignInWithFacebook()">
      <img src="assets/icons/ic_facebook.svg" alt="Facebook" width="18" height="18" class="me-2">
      Facebook
    </button>
  </div>
</div>
