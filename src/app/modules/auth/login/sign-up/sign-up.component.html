<form (ngSubmit)="onSubmit()">
  <!-- Looking For Options -->
  <div class="mb-3">
    <label class="form-label text-uppercase">BẠN ĐANG TÌM KIẾM ĐIỀU GÌ?</label>
    <div class="select-role d-flex gap-2">
      <button 
        type="button"
        class="btn-looking-for flex-fill" 
        [class.active]="lookingFor === 'room'"
        (click)="onLookingForChange('room')">
        Tìm kiếm phòng trọ
      </button>
      <button 
        type="button"
        class="btn-looking-for flex-fill" 
        [class.active]="lookingFor === 'roommate'"
        (click)="onLookingForChange('roommate')">
        Cho thuê phòng trọ
      </button>
    </div>
  </div>

  <!-- Full Name -->
  <app-input-text
    label="Họ và tên"
    type="text"
    placeholder="Tên tôi là..."
    [(ngModel)]="signUpData.fullName"
    name="fullName"
  ></app-input-text>

  <!-- Phone Number -->
  @if (lookingFor === 'roommate') {
    <app-input-text
      label="Số điện thoại"
      type="tel"
      placeholder="Số điện thoại của bạn"
      [(ngModel)]="signUpData.phoneNumber"
      name="phoneNumber"
      [required]="true"
    ></app-input-text>
  }

  <!-- Email -->
  <app-input-text
    label="Email"
    type="email"
    placeholder="Mail tôi là..."
    [(ngModel)]="signUpData.email"
    name="email"
    [required]="true"
  ></app-input-text>

  <!-- Password -->
  <app-input-text
    label="Mật khẩu"
    type="password"
    placeholder="Nhập mật khẩu"
    [(ngModel)]="signUpData.password"
    name="password"
    [required]="true"
  ></app-input-text>

  <!-- Confirm Password -->
  <app-input-text
    label="Xác nhận mật khẩu"
    type="password"
    placeholder="Xác nhận mật khẩu của bạn"
    [(ngModel)]="signUpData.confirmPassword"
    name="confirmPassword"
    [required]="true"
  ></app-input-text>

  <!-- Password mismatch warning -->
  @if (isPasswordMismatch) {
    <div class="alert alert-danger py-2 px-3 mb-3" role="alert">
      <small>Mật khẩu không khớp!</small>
    </div>
  }

  <!-- Terms of Service -->
  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" id="acceptTerms" [(ngModel)]="acceptTerms" name="acceptTerms">
    <label class="form-check-label" for="acceptTerms">
      Tôi đồng ý với <a (click)="onShowTerms()" class="text-primary link-clickable">điều khoản sử dụng</a>
    </label>
  </div>

  <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" [disabled]="isPasswordMismatch || !acceptTerms">Tạo tài khoản</button>
</form>
