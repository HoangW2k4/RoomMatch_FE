<app-popup [visible]="visible" title="Edit Profile" width="440px" bodyPadding="14px" [showFooter]="true"
  (closed)="close()">

  <!-- Avatar Section -->
  <div class="d-flex flex-column align-items-center">
    <div class="position-relative">
      <img [src]="displayAvatar" class="rounded-circle object-fit-cover shadow-sm avatar-preview bg-white" alt="Avatar">
      <div class="avatar-camera-badge position-absolute d-flex align-items-center justify-content-center rounded-circle"
        (click)="fileInput.click()">
        <img src="assets/icons/ic_profile_camera.svg" alt="Camera" width="18" height="18">
      </div>
    </div>
    <label
      class="btn btn-link text-primary mt-2 text-decoration-none fw-semibold shadow-none p-0 cursor-pointer user-select-none"
      style="font-size: 0.9rem;">
      Change Photo
      <input #fileInput type="file" class="d-none" accept="image/*" (change)="onFileSelected($event)">
    </label>
  </div>

  <!-- Form fields -->
  <div class="mb-3">
    <label class="form-label text-dark small fw-bold mb-1">Name</label>
    <input type="text" class="form-control" [(ngModel)]="fullName" placeholder="Enter your name">
  </div>

  <div class="mb-3">
    <label class="form-label text-dark small fw-bold mb-1">Phone Number</label>
    <input type="text" class="form-control" [(ngModel)]="phoneNumber" placeholder="Enter phone number">
  </div>

  <div class="mb-3">
    <label class="form-label text-dark small fw-bold mb-1">Email</label>
    <input type="email" class="form-control" [(ngModel)]="email" placeholder="Enter your email">
  </div>

  <!-- Gender Selection -->
  <div class="mb-4">
    <label class="form-label text-dark small fw-bold mb-2">Gender</label>
    <div class="d-flex gap-2">
      <input type="radio" class="btn-check" name="gender" id="genderMale" value="MALE" [(ngModel)]="gender">
      <label class="btn btn-outline-custom flex-grow-1 rounded-3 py-2 fw-medium text-center small"
        for="genderMale">Nam</label>

      <input type="radio" class="btn-check" name="gender" id="genderFemale" value="FEMALE" [(ngModel)]="gender">
      <label class="btn btn-outline-custom flex-grow-1 rounded-3 py-2 fw-medium text-center small"
        for="genderFemale">Nữ</label>

      <input type="radio" class="btn-check" name="gender" id="genderOther" value="OTHER" [(ngModel)]="gender">
      <label class="btn btn-outline-custom flex-grow-1 rounded-3 py-2 fw-medium text-center small"
        for="genderOther">Khác</label>
    </div>
  </div>

  <!-- Action Buttons -->
  <div popup-footer class="d-flex w-100 gap-2">
    <button type="button" class="btn btn-light flex-grow-1 py-10 fw-semibold rounded-3 text-secondary btn-cancel"
      (click)="close()">Cancel</button>
    <button type="button" class="btn btn-primary flex-grow-1 py-10 fw-semibold rounded-3 btn-save" (click)="submit()"
      [disabled]="isSubmitting">
      <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
      Save Changes
    </button>
  </div>

</app-popup>
