<div class="home-container">
  <!-- Main Layout: Sidebar + Content -->
  <div class="home-layout">
    <!-- Left Panel -->
    <app-left-panel class="home-sidebar"></app-left-panel>

    <!-- Main Content -->
    <div class="home-main">
      <!-- Search & Filters -->
      <section class="search-section">
        <app-search-filter (search)="onSearch($event)"></app-search-filter>
      </section>

      <!-- Feed -->
      <div class="feed-wrapper">
        <!-- Post Feed (center column) -->
        <div class="feed-column">
          <!-- Section Header -->
          <div class="section-header" *ngIf="totalPosts > 0">
            <h2 class="section-title">Phòng trọ mới nhất</h2>
            <span class="post-count">{{ totalPosts }} kết quả</span>
          </div>

          <!-- Loading Skeleton (initial load) -->
          <div class="feed-list" *ngIf="isLoading && feedItems.length === 0">
            <div class="skeleton-card" *ngFor="let s of skeletonItems">
              <div class="skeleton-header">
                <div class="skeleton-avatar shimmer"></div>
                <div class="skeleton-user-info">
                  <div class="skeleton-name shimmer"></div>
                  <div class="skeleton-meta shimmer"></div>
                </div>
              </div>
              <div class="skeleton-title shimmer"></div>
              <div class="skeleton-image shimmer"></div>
              <div class="skeleton-actions shimmer"></div>
            </div>
          </div>

          <!-- Posts Feed -->
          <div class="feed-list" *ngIf="feedItems.length > 0">
            <app-post-card *ngFor="let item of feedItems; trackBy: trackByFeedItemId" [post]="item.originalPost"
              [feedItemType]="item.itemType"
              [feedItemId]="item.feedItemId"
              [publishedAt]="item.publishedAt"
              [actor]="item.actor"
              [contactTarget]="item.contactTarget"
              [canContact]="item.canContact"
              [caption]="item.caption || null"
              [playbackPaused]="isPostDetailVisible"
              (liked)="onLikePost($event)"
              (shared)="onSharePost($event)"
              (openDetail)="onOpenDetail($event)"></app-post-card>
          </div>

          <!-- Empty State -->
          <div class="empty-state" *ngIf="!isLoading && feedItems.length === 0">
            <img src="assets/icons/search.svg" alt="Search" class="empty-state-icon"
              style="width: 64px; height: 64px;" />
            <h3>Không tìm thấy kết quả</h3>
            <p>Thử thay đổi từ khóa hoặc bộ lọc để tìm phòng trọ phù hợp</p>
            <button class="btn-reset-search" (click)="resetSearch()">Xem tất cả</button>
          </div>

          <!-- Infinite scroll: loading more spinner -->
          <div class="loading-more" *ngIf="isLoadingMore">
            <div class="spinner"></div>
          </div>

          <!-- Scroll sentinel (invisible trigger for IntersectionObserver) -->
          <div #scrollSentinel class="scroll-sentinel"></div>

          <!-- End of feed -->
          <div class="end-of-feed" *ngIf="!hasMore && feedItems.length > 0 && !isLoading">
            <span>Bạn đã xem hết bài đăng</span>
          </div>
        </div>
      </div>

    </div>

    <!-- Right Panel -->
    <app-right-panel class="home-right-sidebar" [posts]="posts"
      (openDetail)="onOpenDetail($event)"></app-right-panel>
  </div>

  <!-- Post Detail Popup (single instance at home level) -->
  <app-post-detail
    [visible]="isPostDetailVisible"
    [postId]="selectedPostId"
    [homePosts]="posts"
    (closed)="onCloseDetail()"
  ></app-post-detail>
  <app-repost-popup [visible]="isRepostVisible" [post]="selectedRepostPost" (closed)="closeRepost()" (alreadyReposted)="notifyAlreadyReposted()"></app-repost-popup>
</div>
