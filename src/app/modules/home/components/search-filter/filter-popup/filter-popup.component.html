<app-popup [visible]="visible" [title]="'Bộ lọc tìm kiếm'" width="660px" maxHeight="88vh" bodyPadding="0"
    [scrollableBody]="true" [showFooter]="true" (closed)="onPopupClosed()">

    <div class="px-4 pt-2 pb-1 d-flex flex-column gap-3">
        <div class="d-flex flex-column gap-2">
            <label class="form-label fw-bold mb-0 small">Từ khóa</label>
            <app-input-field
                [control]="keywordControl"
                type="text"
                placeholder="Nhập tên đường, dự án hoặc từ khóa..."
                (onChange)="onKeywordChange($event)"
            ></app-input-field>
        </div>

        <!-- Location -->
        <div class="d-flex flex-column gap-2">
            <label class="form-label fw-bold mb-0 small">Vị trí</label>
            <div class="row g-2">
                <div class="col-4">
                    <app-dropdown-field
                        class="mt-1 d-block fp-dropdown-sm"
                        [items]="provinces"
                        [value]="selectedProvince"
                        [displayWith]="locationDisplay"
                        [compareWith]="locationCompare"
                        [placeholder]="'Chọn Tỉnh/Thành phố'"
                        [searchable]="true"
                        [searchPlaceholder]="'Tìm tỉnh/thành phố...'"
                        [error]="true"
                        (valueChange)="onProvinceChange($event)"
                    ></app-dropdown-field>
                </div>
                <div class="col-4">
                    <app-dropdown-field
                        class="mt-1 d-block fp-dropdown-sm"
                        [items]="modalDistricts"
                        [value]="selectedDistrict"
                        [displayWith]="locationDisplay"
                        [compareWith]="locationCompare"
                        [placeholder]="'Chọn Quận/Huyện'"
                        [searchable]="true"
                        [searchPlaceholder]="'Tìm quận/huyện...'"
                        [disabled]="!draft.provinceCode"
                        [error]="true"
                        (valueChange)="onDistrictChange($event)"
                    ></app-dropdown-field>
                </div>
                <div class="col-4">
                     <app-dropdown-field
                        class="mt-1 d-block fp-dropdown-sm"
                        [items]="modalWards"
                        [value]="selectedWard"
                        [displayWith]="locationDisplay"
                        [compareWith]="locationCompare"
                        [placeholder]="'Chọn Phường/Xã'"
                        [searchable]="true"
                        [searchPlaceholder]="'Tìm phường/xã...'"
                        [disabled]="!draft.districtCode"
                        [error]="true"
                        (valueChange)="onWardChange($event)"
                    ></app-dropdown-field>
                </div>
            </div>
        </div>

        <!-- Price Range -->
        <div class="d-flex flex-column gap-2">
            <label class="form-label fw-bold mb-0 small">Khoảng giá (VNĐ)</label>
            <div class="d-flex align-items-center gap-2">
                <app-input-field class="flex-grow-1"
                    [control]="minPriceControl"
                    type="currency"
                    placeholder="0"
                    afterInput="₫"
                    (onChange)="onMinPriceChange($event)"
                ></app-input-field>
                <span class="text-muted small flex-shrink-0">—</span>
                <app-input-field class="flex-grow-1"
                    [control]="maxPriceControl"
                    type="currency"
                    placeholder="Không giới hạn"
                    afterInput="₫"
                    (onChange)="onMaxPriceChange($event)"
                ></app-input-field>
            </div>
            <div class="d-flex flex-wrap gap-2 mt-1">
                <button *ngFor="let r of PRICE_RANGES"
                    class="btn btn-sm rounded-pill fp-quick-btn"
                    [class.fp-quick-btn--active]="isPriceActive(r)" (click)="setPriceRange(r)">
                    {{ r.label }}
                </button>
            </div>
        </div>

        <!-- Area -->
        <div class="d-flex flex-column gap-2">
            <label class="form-label fw-bold mb-0 small">Diện tích (m²)</label>
            <div class="d-flex align-items-center gap-2">
                <app-input-field class="flex-grow-1"
                    [control]="minAreaControl"
                    type="number"
                    placeholder="Từ"
                    afterInput="m²"
                    [min]="0"
                    (onChange)="onMinAreaChange($event)"
                ></app-input-field>
                <span class="text-muted small flex-shrink-0">—</span>
                <app-input-field class="flex-grow-1"
                    [control]="maxAreaControl"
                    type="number"
                    placeholder="Đến"
                    afterInput="m²"
                    [min]="0"
                    (onChange)="onMaxAreaChange($event)"
                ></app-input-field>
            </div>
        </div>

        <!-- Amenities -->
        <div class="d-flex flex-column gap-2">
            <label class="form-label fw-bold mb-0 small">Tiện ích</label>
            <div class="d-flex flex-wrap gap-2">
                <button *ngFor="let chip of draftAmenities"
                    class="btn btn-sm rounded-pill border bg-light text-secondary d-inline-flex align-items-center gap-1 fp-chip amenity-chip"
                    [class.fp-chip--active]="chip.active" (click)="chip.active = !chip.active">
                    <img [src]="chip.icon" [alt]="chip.label" title="{{ chip.label }}" class="fp-chip-icon" />
                    {{ chip.label }}
                </button>
            </div>
        </div>

        <!-- Roommate toggle -->
        <div class="d-flex align-items-center justify-content-between bg-light border rounded-3 px-3 py-2">
            <div class="d-flex align-items-center gap-2 flex-grow-1">
                <img src="assets/icons/ic_roommate.svg" alt="Ở ghép" class="fp-icon-md" />
                <div>
                    <div class="fw-semibold small">Tìm người ở ghép</div>
                    <div class="text-muted fp-sub-text">Chỉ hiện thị bài đăng đang tìm bạn đồng hành
                    </div>
                </div>
            </div>
            <div class="form-check form-switch mb-0 ms-2">
                <input class="form-check-input" type="checkbox" role="switch" title="Tìm người ở ghép" [checked]="isRoommateMode"
                    (change)="toggleRoommate()">
            </div>
        </div>

        <!-- Roommate detail (conditional) -->
        <div class="d-flex flex-column gap-3 border rounded-3 p-3 fp-roommate-detail" *ngIf="isRoommateMode">
            <!-- Gender -->
            <div class="d-flex flex-column gap-2">
                <span class="form-text text-uppercase small fw-semibold">GIỚI TÍNH MONG MUỐN</span>
                <div class="d-flex gap-2">
                    <button *ngFor="let g of GENDERS"
                        class="btn btn-sm flex-grow-1 fp-gender-btn"
                        [class.fp-gender-btn--active]="draft.gender === g.value"
                        (click)="draft.gender = (draft.gender === g.value ? undefined : g.value)">
                        {{ g.label }}
                    </button>
                </div>
            </div>
            <!-- Age range -->
            <div class="d-flex flex-column gap-2">
                <span class="form-text text-uppercase small fw-semibold">ĐỘ TUỔI</span>
                <div class="d-flex align-items-center gap-2">
                    <app-input-field class="flex-grow-1"
                        [control]="minAgeControl"
                        type="number"
                        placeholder="Từ"
                        afterInput="tuổi"
                        [min]="0"
                        [max]="99"
                        (onChange)="onMinAgeChange($event)"
                    ></app-input-field>
                    <span class="text-muted small flex-shrink-0">—</span>
                    <app-input-field class="flex-grow-1"
                        [control]="maxAgeControl"
                        type="number"
                        placeholder="Đến"
                        afterInput="tuổi"
                        [min]="0"
                        [max]="99"
                        (onChange)="onMaxAgeChange($event)"
                    ></app-input-field>
                </div>
            </div>
        </div>

    </div>

    <!-- Footer slot -->
    <div popup-footer class="d-flex align-items-center justify-content-between w-100 gap-3">
        <button class="btn btn-link text-secondary text-decoration-underline small" (click)="resetDraft()">Xóa tất cả
            bộ lọc</button>
        <button class="btn btn-primary d-flex align-items-center gap-2 fw-bold" (click)="applyDraft()">
            <img src="assets/icons/ic_search_white.svg" alt="Tìm" class="fp-icon-sm" />
            Áp dụng &amp; Tìm kiếm
        </button>
    </div>

</app-popup>
