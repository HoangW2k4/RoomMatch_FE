<app-popup [visible]="visible" [title]="'Bộ lọc tìm kiếm'" width="600px" maxHeight="88vh" bodyPadding="0"
    [scrollableBody]="true" [showFooter]="true" (closed)="onPopupClosed()">

    <div class="px-4 pt-3 pb-1 d-flex flex-column gap-3">

        <div class="d-flex flex-column gap-2">
            <label class="form-label fw-bold mb-0 small">Từ khóa</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                    <img src="assets/icons/ic_search.svg" alt="Tìm" class="fp-input-icon" />
                </span>
                <input type="text" class="form-control border-start-0"
                    placeholder="Nhập tên đường, dự án hoặc từ khóa..." [(ngModel)]="draft.keyword">
            </div>
        </div>

        <!-- Location -->
        <div class="d-flex flex-column gap-2">
            <label class="form-label fw-bold mb-0 small">Vị trí</label>
            <div class="row g-2">
                <div class="col-4">
                    <span class="form-text text-uppercase small fw-semibold">TỈNH/THÀNH PHỐ</span>
                    <select class="form-select form-select-sm mt-1" title="Chọn Tỉnh/Thành phố" [(ngModel)]="draft.provinceCode"
                        (ngModelChange)="onProvinceChange($event)">
                        <option value="" disabled selected>Chọn Tỉnh/Thành phố</option>
                        <option *ngFor="let p of provinces" [value]="p.code">{{ p.name }}</option>
                    </select>
                </div>
                <div class="col-4">
                    <span class="form-text text-uppercase small fw-semibold">QUẬN/HUYỆN</span>
                    <select class="form-select form-select-sm mt-1" title="Chọn Quận/Huyện" [(ngModel)]="draft.districtCode"
                        [disabled]="!draft.provinceCode" (ngModelChange)="onDistrictChange($event)">
                        <option value="" disabled selected>Chọn Quận/Huyện</option>
                        <option *ngFor="let d of modalDistricts" [value]="d.code">{{ d.name }}</option>
                    </select>
                </div>
                <div class="col-4">
                    <span class="form-text text-uppercase small fw-semibold">PHƯỜNG/XÃ</span>
                    <select class="form-select form-select-sm mt-1" title="Chọn Phường/Xã" [(ngModel)]="draft.wardCode"
                        [disabled]="!draft.districtCode">
                        <option value="" disabled selected>Chọn Phường/Xã</option>
                        <option *ngFor="let w of modalWards" [value]="w.code">{{ w.name }}</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Price Range -->
        <div class="d-flex flex-column gap-2">
            <label class="form-label fw-bold mb-0 small">Khoảng giá (VNĐ)</label>
            <div class="d-flex align-items-center gap-2">
                <div class="input-group input-group-sm flex-grow-1">
                    <input type="text" inputmode="numeric" class="form-control" placeholder="0"
                        [value]="draftMinPriceStr" (input)="onPriceInput('min', $event)" />
                    <span class="input-group-text text-muted small">₫</span>
                </div>
                <span class="text-muted small flex-shrink-0">—</span>
                <div class="input-group input-group-sm flex-grow-1">
                    <input type="text" inputmode="numeric" class="form-control" placeholder="Không giới hạn"
                        [value]="draftMaxPriceStr" (input)="onPriceInput('max', $event)" />
                    <span class="input-group-text text-muted small">₫</span>
                </div>
            </div>
            <div class="d-flex flex-wrap gap-2 mt-1">
                <button *ngFor="let r of PRICE_RANGES"
                    class="btn btn-sm rounded-pill fp-quick-btn"
                    [class.fp-quick-btn--active]="isPriceActive(r)" (click)="setPriceRange(r)">
                    {{ r.label }}
                </button>
            </div>
        </div>

        <!-- Area -->
        <div class="d-flex flex-column gap-2">
            <label class="form-label fw-bold mb-0 small">Diện tích (m²)</label>
            <div class="d-flex align-items-center gap-2">
                <input type="number" class="form-control form-control-sm flex-grow-1" placeholder="Từ"
                    [(ngModel)]="draft.minArea" min="0" />
                <span class="text-muted small flex-shrink-0">—</span>
                <input type="number" class="form-control form-control-sm flex-grow-1" placeholder="Đến"
                    [(ngModel)]="draft.maxArea" min="0" />
            </div>
        </div>

        <!-- Amenities -->
        <div class="d-flex flex-column gap-2">
            <label class="form-label fw-bold mb-0 small">Tiện ích</label>
            <div class="d-flex flex-wrap gap-2">
                <button *ngFor="let chip of draftAmenities"
                    class="btn btn-sm rounded-pill border bg-light text-secondary d-inline-flex align-items-center gap-1 fp-chip"
                    [class.fp-chip--active]="chip.active" (click)="chip.active = !chip.active">
                    <img [src]="chip.icon" [alt]="chip.label" title="{{ chip.label }}" class="fp-chip-icon" />
                    {{ chip.label }}
                </button>
            </div>
        </div>

        <!-- Roommate toggle -->
        <div class="d-flex align-items-center justify-content-between bg-light border rounded-3 px-3 py-2">
            <div class="d-flex align-items-center gap-2 flex-grow-1">
                <img src="assets/icons/ic_roommate.svg" alt="Ở ghép" class="fp-icon-md" />
                <div>
                    <div class="fw-semibold small">Tìm người ở ghép</div>
                    <div class="text-muted fp-sub-text">Chỉ hiện thị bài đăng đang tìm bạn đồng hành
                    </div>
                </div>
            </div>
            <div class="form-check form-switch mb-0 ms-2">
                <input class="form-check-input" type="checkbox" role="switch" title="Tìm người ở ghép" [checked]="isRoommateMode"
                    (change)="toggleRoommate()">
            </div>
        </div>

        <!-- Roommate detail (conditional) -->
        <div class="d-flex flex-column gap-3 border rounded-3 p-3 fp-roommate-detail" *ngIf="isRoommateMode">
            <!-- Gender -->
            <div class="d-flex flex-column gap-2">
                <span class="form-text text-uppercase small fw-semibold">GIỚI TÍNH MONG MUỐN</span>
                <div class="d-flex gap-2">
                    <button *ngFor="let g of GENDERS"
                        class="btn btn-sm flex-grow-1 fp-gender-btn"
                        [class.fp-gender-btn--active]="draft.gender === g.value"
                        (click)="draft.gender = (draft.gender === g.value ? undefined : g.value)">
                        {{ g.label }}
                    </button>
                </div>
            </div>
            <!-- Age range -->
            <div class="d-flex flex-column gap-2">
                <span class="form-text text-uppercase small fw-semibold">ĐỘ TUỔI</span>
                <div class="d-flex align-items-center gap-2">
                    <div class="input-group input-group-sm flex-grow-1">
                        <input type="number" class="form-control" placeholder="Từ" [(ngModel)]="draft.minAge" min="0"
                            max="99" />
                        <span class="input-group-text text-muted small">tuổi</span>
                    </div>
                    <span class="text-muted small flex-shrink-0">—</span>
                    <div class="input-group input-group-sm flex-grow-1">
                        <input type="number" class="form-control" placeholder="Đến" [(ngModel)]="draft.maxAge" min="0"
                            max="99" />
                        <span class="input-group-text text-muted small">tuổi</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Footer slot -->
    <div popup-footer class="d-flex align-items-center justify-content-between w-100 gap-3">
        <button class="btn btn-link text-secondary text-decoration-underline small" (click)="resetDraft()">Xóa tất cả
            bộ lọc</button>
        <button class="btn btn-primary d-flex align-items-center gap-2 fw-bold" (click)="applyDraft()">
            <img src="assets/icons/ic_search_white.svg" alt="Tìm" class="fp-icon-sm" />
            Áp dụng &amp; Tìm kiếm
        </button>
    </div>

</app-popup>
