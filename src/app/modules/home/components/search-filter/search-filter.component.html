<div class="card border-0 shadow-sm rounded-4 p-3 d-flex flex-column gap-2">

  <!-- Compact Search bar -->
  <div class="search-bar d-flex align-items-center gap-2 rounded-pill px-3 py-2">
    <img src="assets/icons/ic_search.svg" alt="avatar" class="sf-search-icon">
    <input type="text" class="form-control form-control-sm border-0 bg-transparent shadow-none sf-search-input"
      [placeholder]="searchPlaceholder" title="Tìm kiếm phòng" [(ngModel)]="filters.keyword"
      (ngModelChange)="onKeywordChange($event)" />
    <button class="btn btn-sm p-1 rounded-circle d-flex align-items-center" *ngIf="filters.keyword"
      (click)="clearKeyword()">
      <img src="assets/icons/close.svg" class="sf-close-icon" alt="x" />
    </button>
    <button class="btn btn-sm p-1 rounded-2 text-secondary d-flex align-items-center sf-filter-icon-btn"
      (click)="openFilterPopup()" title="Mở bộ lọc">
      <img src="assets/icons/filter.svg" alt="Bộ lọc" class="sf-icon-sm" />
    </button>
  </div>

  <!-- Display pills row (location + price) -->
  <div class="d-flex flex-wrap gap-1 w-100 sf-clickable" (click)="openFilterPopup()">
    <!-- Province -->
    <div class="sf-pill d-inline-flex align-items-center gap-1" [class.sf-pill--set]="filters.provinceCode">
      <img src="assets/icons/ic_location_pin.svg" alt="Vị trí" class="sf-icon-xs" />
      <span class="sf-pill-text">{{ getProvinceLabel() }}</span>
      <button *ngIf="filters.provinceCode" class="sf-pill-remove" aria-label="Xóa tỉnh"
        (click)="removeProvince($event)">
        <img src="assets/icons/close.svg" class="sf-pill-remove-icon" alt="×" />
      </button>
    </div>
    <!-- District -->
    <div class="sf-pill d-inline-flex align-items-center gap-1" [class.sf-pill--set]="filters.districtCode">
      <span class="sf-pill-text">{{ getDistrictLabel() }}</span>
      <button *ngIf="filters.districtCode" class="sf-pill-remove" aria-label="Xóa quận/huyện"
        (click)="removeDistrict($event)">
        <img src="assets/icons/close.svg" class="sf-pill-remove-icon" alt="×" />
      </button>
    </div>
    <!-- Ward -->
    <div class="sf-pill d-inline-flex align-items-center gap-1" [class.sf-pill--set]="filters.wardCode">
      <span class="sf-pill-text">{{ getWardLabel() }}</span>
      <button *ngIf="filters.wardCode" class="sf-pill-remove" aria-label="Xóa phường/xã"
        (click)="removeWard($event)">
        <img src="assets/icons/close.svg" class="sf-pill-remove-icon" alt="×" />
      </button>
    </div>
    <!-- Price -->
    <div class="sf-pill d-inline-flex align-items-center gap-1"
      [class.sf-pill--set]="filters.minPrice != null || filters.maxPrice != null">
      <img src="assets/icons/ic_price.svg" alt="Giá" class="sf-icon-xs" />
      <span class="sf-pill-text">{{ getPriceLabel() }}</span>
      <button *ngIf="filters.minPrice != null || filters.maxPrice != null" class="sf-pill-remove" aria-label="Xóa giá"
        (click)="removePrice($event)">
        <img src="assets/icons/close.svg" class="sf-pill-remove-icon" alt="×" />
      </button>
    </div>
  </div>

  <!-- Amenity chips: show selected ones with X, or first-3 preview when none selected -->
  <div class="d-flex flex-wrap gap-2 w-100">
    <ng-container *ngIf="activeAmenityChips.length > 0; else previewAmenities">
      <div *ngFor="let chip of activeAmenityChips"
        class="sf-chip sf-chip--active d-inline-flex align-items-center gap-1 rounded-pill border px-2 py-1 sf-clickable"
        (click)="openFilterPopup()">
        <img [src]="chip.icon" [alt]="chip.label" title="{{chip.label}}" class="sf-chip-icon" />
        <span>{{ chip.label }}</span>
        <button class="sf-chip-remove" [attr.aria-label]="'Xóa ' + chip.label"
          (click)="removeAmenity($event, chip)">
          <img src="assets/icons/close.svg" class="sf-chip-remove-icon" alt="×" />
        </button>
      </div>
      <button *ngIf="inactiveAmenityCount > 0"
        class="btn btn-sm rounded-pill border border-dashed text-muted d-inline-flex align-items-center gap-1"
        (click)="openFilterPopup()">
        +{{ inactiveAmenityCount }}
      </button>
    </ng-container>

    <ng-template #previewAmenities>
      <button *ngFor="let chip of previewChips"
        class="btn btn-sm rounded-pill border text-secondary d-inline-flex align-items-center gap-1 sf-chip"
        [class.sf-chip--active]="chip.active" (click)="openFilterPopup()">
        <img [src]="chip.icon" [alt]="chip.label" title="{{chip.label}}" class="sf-chip-icon" />
        {{ chip.label }}
      </button>
      <button *ngIf="hiddenChipsCount > 0"
        class="btn btn-sm rounded-pill border border-dashed text-muted d-inline-flex align-items-center gap-1"
        (click)="openFilterPopup()">
        +{{ hiddenChipsCount }}
      </button>
    </ng-template>
  </div>

  <!-- Roommate toggle -->
  <div class="d-flex align-items-center justify-content-between bg-light border rounded-3 px-3 py-2 sf-clickable"
    (click)="isRoommateMode = !isRoommateMode">
    <div class="d-flex align-items-center gap-2 flex-grow-1 min-w-0">
      <img src="assets/icons/ic_roommate.svg" alt="Ở ghép" class="sf-icon-md" />
      <div>
        <div class="fw-semibold small">Tìm người ở ghép</div>
        <div class="text-muted sf-sub-text">Chỉ hiển thị bài đăng đang tìm bạn đồng hành</div>
      </div>
    </div>
    <div class="form-check form-switch mb-0 ms-2">
      <input class="form-check-input" type="checkbox" role="switch" title="Tìm người ở ghép"
        [checked]="isRoommateMode" (click)="$event.stopPropagation()">
    </div>
  </div>

  <!-- Search button -->
  <button class="btn btn-primary w-100 rounded-3 fw-bold d-flex align-items-center justify-content-center gap-2 py-2"
    (click)="applyFilters()">
    <img src="assets/icons/ic_search_white.svg" alt="Tìm" class="sf-icon-sm" />
    Tìm phòng
  </button>
</div>

<!-- Filter Popup (separate component) -->
<app-filter-popup [(visible)]="showFilterPopup" [(isRoommateMode)]="isRoommateMode" [initialFilters]="appliedFilters"
  [allAmenityChips]="amenityChips" (apply)="onFilterApply($event)">
</app-filter-popup>
