<div class="comment-section border-top bg-white p-3" *ngIf="visible">
  <!-- Header -->
  <div class="comment-header d-flex align-items-center justify-content-between mb-2">
    <span class="comment-title fw-bold">{{ totalCommentCount }} Bình luận</span>
    <span class="sort-label small fw-semibold text-secondary">Phù hợp nhất</span>
  </div>

  <!-- Loading -->
  <div class="comment-loading d-flex justify-content-center py-3" *ngIf="loading">
    <div class="spinner-border spinner-border-sm text-secondary" role="status" aria-label="loading comments"></div>
  </div>

  <!-- Comments list -->
  <div class="comments-list d-flex flex-column overflow-auto" *ngIf="!loading">
    <!-- Top-level comments -->
    <ng-container *ngFor="let comment of visibleComments; let isLast = last">
      <ng-container
        *ngTemplateOutlet="commentTpl; context: { $implicit: comment, depth: 0, rootParent: comment, isLast: isLast }"
      ></ng-container>
    </ng-container>

    <!-- Show more top-level comments -->
    <div class="show-more-top" *ngIf="hasMoreTopLevel">
      <button class="toggle-btn btn btn-link p-0 text-decoration-none" (click)="showMoreTopLevel()">
        Xem thêm {{ remainingTopLevelCount }} bình luận...
      </button>
    </div>

    <!-- Empty state -->
    <div class="empty-comments text-center py-3" *ngIf="comments.length === 0">
      <p class="mb-0 text-secondary">Chưa có bình luận nào. Hãy là người đầu tiên bình luận!</p>
    </div>
  </div>

  <!-- Write new comment (at bottom) -->
  <div class="comment-input-box d-flex align-items-center gap-2 pt-2 mt-1 border-top" *ngIf="!loading">
    <img
      [src]="currentUserAvatar || 'assets/images/avatar_default.jpg'"
      class="comment-avatar"
      alt="avatar"
      title="avatar"
      (error)="onAvatarError($event)"
    />
    <div class="input-wrapper flex-grow-1 position-relative d-flex align-items-center">
      <input
        type="text"
        class="comment-input form-control rounded-pill"
        [(ngModel)]="newCommentText"
        placeholder="Viết bình luận..."
        (keydown)="onKeydown($event, 'comment')"
      />
      <button
        class="send-btn btn btn-link text-primary p-1"
        [disabled]="!newCommentText.trim()"
        (click)="submitComment()"
        title="Gửi"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- ===== Recursive comment template ===== -->
<ng-template #commentTpl let-comment let-depth="depth" let-rootParent="rootParent" let-isLast="isLast">
  <div class="comment-thread" [class.is-nested]="depth > 0" [class.is-last-child]="isLast">

    <div class="comment-row d-flex align-items-start gap-2 py-1">
      <img
        [src]="comment.userAvatarUrl || 'assets/images/avatar_default.jpg'"
        class="comment-avatar"
        [class.small]="depth > 0"
        alt="avatar"
        title="avatar"
        (error)="onAvatarError($event)"
      />
      <div class="comment-content flex-grow-1 min-w-0">
        <div class="comment-bubble rounded-4 px-3 py-2 bg-body-secondary d-inline-block">
          <span class="comment-author fw-semibold small d-block">{{ comment.userFullName }}</span>
          <p class="comment-text mb-0" *ngIf="!comment.isDeleted">{{ comment.content }}</p>
          <p class="comment-text deleted mb-0 fst-italic" *ngIf="comment.isDeleted">Bình luận đã bị xóa</p>
        </div>
        <div class="comment-meta d-flex align-items-center gap-2 px-2 pt-1">
          <span class="comment-time small text-secondary">{{ formatTime(comment.createdAt) }}</span>
          <button class="meta-btn btn btn-link btn-sm p-0 text-secondary text-decoration-none" *ngIf="!comment.isDeleted" (click)="startReply(comment)">Trả lời</button>
          <button class="meta-btn delete-btn btn btn-link btn-sm p-0 text-danger text-decoration-none" *ngIf="isOwner(comment) && !comment.isDeleted" (click)="deleteComment(comment.id)">Xóa</button>
        </div>
      </div>
    </div>

    <div class="reply-input-box d-flex align-items-center gap-2" *ngIf="replyingTo?.id === comment.id">
      <img
        [src]="currentUserAvatar || 'assets/images/avatar_default.jpg'"
        class="comment-avatar small"
        alt="avatar"
        title="avatar"
        (error)="onAvatarError($event)"
      />
      <div class="input-wrapper flex-grow-1 position-relative d-flex align-items-center">
        <input
          type="text"
          class="comment-input form-control rounded-pill"
          title="reply"
          [(ngModel)]="replyText"
          [placeholder]="'Viết phản hồi...'"
          (keydown)="onKeydown($event, 'reply')"
        />
        <div class="reply-btn-group d-flex align-items-center gap-1 ms-1">
          <button class="cancel-reply-btn btn btn-sm btn-light border" (click)="cancelReply()">Hủy</button>
          <button
            class="send-btn small btn btn-link text-primary p-1"
            [disabled]="!replyText.trim()"
            (click)="submitReply()"
            title="Gửi"
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- "View N replies..." toggle (for depth >= 2 collapsed) -->
    <div class="view-replies-toggle" *ngIf="shouldShowExpandBtn(comment, depth)">
      <button class="toggle-btn btn btn-link btn-sm p-0 text-decoration-none" (click)="expandThread(comment.id)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
        Xem {{ countAllChildren(comment) }} phản hồi...
      </button>
    </div>

    <!-- "View N replies..." toggle (for manually collapsed via toggleThread) -->
    <div class="view-replies-toggle" *ngIf="comment.childComments?.length && isThreadCollapsed(comment.id)">
      <button class="toggle-btn btn btn-link btn-sm p-0 text-decoration-none" (click)="toggleThread(comment.id)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
        Xem {{ countAllChildren(comment) }} phản hồi...
      </button>
    </div>

    <!-- Child comments (recursive) -->
    <div class="children-wrapper" *ngIf="shouldShowChildren(comment, depth) && !isThreadCollapsed(comment.id)">
      <ng-container *ngFor="let child of comment.childComments; let childLast = last">
        <ng-container
          *ngTemplateOutlet="commentTpl; context: { $implicit: child, depth: depth + 1, rootParent: depth === 0 ? comment : rootParent, isLast: childLast }"
        ></ng-container>
      </ng-container>
    </div>
  </div>
</ng-template>
