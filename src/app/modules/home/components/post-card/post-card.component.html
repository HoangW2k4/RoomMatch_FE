<div class="post-card">
  <!-- Header -->
  <div class="post-header">
    <div class="user-info">
      <div class="avatar-wrapper">
        <img
          [src]="post.landlordInfo?.avatarUrl || 'assets/images/avatar_default.jpg'"
          class="avatar"
          title="avatar"
          (error)="onAvatarError($event)"
        />
        <span class="online-dot"></span>
      </div>
      <div class="user-details">
        <div class="user-name-row">
          <span class="user-name">{{ post.landlordInfo?.name || 'Chủ phòng' }}</span>
          <img src="/assets/icons/ic_verified.svg" class="verified-badge" width="16" height="16" alt="verified">
        </div>
        <div class="post-meta-info">
          {{ formatDate(post.createdAt) }} · {{ post.address.districtName || post.address.provinceName || '' }}
        </div>
      </div>
    </div>
    <span class="status-badge">CÒN PHÒNG</span>
  </div>

  <!-- Title -->
  <h3 class="post-title">{{ post.title }}</h3>

  <!-- Location + Price -->
  <div class="location-price">
    <div class="location">
     <div class="icon-wrapper">
        <img src="/assets/icons/ic_location.svg" class="icon-normal" alt="icon">
        <img src="/assets/icons/ic_location_hover.svg" class="icon-hover" alt="icon hover">
    </div>
      <a href={{post.address.addressUrl}} target="_blank">{{ shortAddress }}</a>
    </div>
    <div class="price">
      <span class="price-value">${{ formatPrice(post.price) }}</span>
      <span class="price-unit">/tháng</span>
    </div>
  </div>

  <!-- Image Gallery - Facebook Style -->
  <div class="image-gallery" (click)="onOpenDetail($event)">
    <app-gallery-layout-1 *ngIf="imageCount === 1" [medias]="sortedMedias" [alt]="post.title"></app-gallery-layout-1>
    <app-gallery-layout-2 *ngIf="imageCount === 2" [medias]="sortedMedias" [alt]="post.title"></app-gallery-layout-2>
    <app-gallery-layout-3 *ngIf="imageCount === 3" [medias]="sortedMedias" [alt]="post.title"></app-gallery-layout-3>
    <app-gallery-layout-4 *ngIf="imageCount === 4" [medias]="sortedMedias" [alt]="post.title"></app-gallery-layout-4>
    <app-gallery-layout-5 *ngIf="imageCount >= 5" [medias]="sortedMedias" [alt]="post.title"></app-gallery-layout-5>
  </div>

  <!-- Expand Button -->
  <div class="expand-row" (click)="onOpenDetail($event)">
    <button class="expand-btn" title="btn">
      <img src="/assets/icons/ic_chevron_down.svg" width="18" height="18" alt="expand">
    </button>
  </div>

  <!-- Actions Footer -->
  <div class="post-actions">
    <div class="action-group">
      <button class="action-btn" [class.liked]="post.likedByCurrentUser" (click)="onLike($event)">
        <img [src]="post.likedByCurrentUser ? '/assets/icons/ic_heart_liked.svg' : '/assets/icons/ic_heart.svg'" width="18" height="18" alt="like">
        <span>Thích</span>
        <span class="count">{{ post.statistics.saveCount || 0 }}</span>
      </button>
      <button class="action-btn" (click)="onComment($event)">
        <img src="/assets/icons/ic_comment.svg" width="18" height="18" alt="comment">
        <span>Bình luận</span>
        <span class="count">{{ post.statistics.commentCount || 0 }}</span>
      </button>
      <button class="action-btn" (click)="onShare($event)">
        <img src="/assets/icons/ic_share.svg" width="18" height="18" alt="share">
        <span>Chia sẻ</span>
        <span class="count">{{ post.statistics.shareCount || 0 }}</span>
      </button>
    </div>
    <button class="contact-btn" *ngIf="!isOwner" (click)="onContact($event)">
      <img src="/assets/icons/ic_send.svg" width="16" height="16" alt="send">
      <span>Contact</span>
    </button>
  </div>

  <!-- Comment Section -->
  <app-comment-section
    #commentSection
    [postId]="post.id"
    [visible]="showComments"
  ></app-comment-section>

</div>
