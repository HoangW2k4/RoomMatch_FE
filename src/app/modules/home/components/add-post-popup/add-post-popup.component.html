<app-popup [visible]="visible" title="Tạo mới bài đăng" width="650px" maxHeight="90vh" height="90vh" bodyPadding="20px" [showFooter]="true" [scrollableBody]="false" (closed)="close()">
  
  <div class="add-post-container d-flex flex-column gap-4">
    
    <!-- Photos & Videos -->
    <section>
      <h6 class="fw-bold mb-3 section-title">Photos & Videos</h6>
      <div class="d-flex flex-wrap gap-3">
        <!-- Add Button -->
        <label class="media-upload-box d-flex flex-column align-items-center justify-content-center border border-2 border-dashed rounded-4 cursor-pointer">
          <img src="assets/icons/ic_profile_camera.svg" alt="Add Media" width="24" height="24" class="mb-2 opacity-50">
          <span class="text-secondary small fw-medium">Add Media</span>
          <input type="file" class="d-none" accept="image/*" multiple (change)="onFileSelected($event)">
        </label>

        <!-- Previews -->
        <div *ngFor="let preview of mediaPreviews; let i = index" class="position-relative media-preview-box rounded-4 overflow-hidden shadow-sm">
          <img [src]="preview" alt="Preview" class="w-100 h-100 object-fit-cover">
          <button class="btn btn-sm btn-light position-absolute top-0 end-0 m-1 rounded-circle flex-center p-1 shadow-sm" (click)="removeMedia(i)">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Basic Info -->
    <section>
      <div class="mb-3">
        <label class="form-label small fw-bold text-secondary mb-1 text-uppercase">Title of the post</label>
        <app-input-field
          [control]="titleControl"
          placeholder="e.g. Cozy studio apartment near city center">
        </app-input-field>
      </div>
      <div>
        <label class="form-label small fw-bold text-secondary mb-1 text-uppercase">Description</label>
        <app-input-field
          [control]="descriptionControl"
          [multiline]="true"
          [rows]="4"
          placeholder="Describe the room, building, and ideal roommate...">
        </app-input-field>
      </div>
    </section>

    <!-- Location -->
    <section>
      <h6 class="fw-bold mb-3 section-title text-primary d-flex align-items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="text-primary" viewBox="0 0 16 16">
          <path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10zm0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>
        </svg>
        LOCATION
      </h6>
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label class="form-label small fw-bold text-secondary mb-1 text-uppercase">Province</label>
          <select class="form-select" [(ngModel)]="selectedProvinceCode" (change)="onProvinceChange()">
            <option value="">Select Province</option>
            <option *ngFor="let prov of provinces" [value]="prov.code">{{ prov.name }}</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label small fw-bold text-secondary mb-1 text-uppercase">District</label>
          <select class="form-select" [(ngModel)]="selectedDistrictCode" (change)="onDistrictChange()" [disabled]="!selectedProvinceCode">
            <option value="">Select District</option>
            <option *ngFor="let dist of districts" [value]="dist.code">{{ dist.name }}</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label small fw-bold text-secondary mb-1 text-uppercase">Ward</label>
          <select class="form-select" [(ngModel)]="selectedWardCode" [disabled]="!selectedDistrictCode">
            <option value="">Select Ward</option>
            <option *ngFor="let ward of wards" [value]="ward.code">{{ ward.name }}</option>
          </select>
        </div>
      </div>
      <div>
        <label class="form-label small fw-bold text-secondary mb-1 text-uppercase">Specific Address</label>
        <app-input-field
          [control]="streetControl"
          placeholder="House number, street name...">
        </app-input-field>
      </div>
    </section>

    <!-- Pricing & Details -->
    <section class="row g-4">
      <div class="col-md-6 border-end pe-md-4">
        <div class="mb-3">
          <label class="form-label small fw-bold text-secondary mb-1 text-uppercase">Monthly Rental Price</label>
          <app-input-field
            [control]="priceControl"
            type="currency"
            [decimalFormat]="{ integer: 12, decimal: 0 }"
            thousandSeparator="."
            decimalSeparator="," 
            [min]="0"
            [step]="100000"
            beforeInput="$"
            placeholder="0">
          </app-input-field>
        </div>
        <div>
          <label class="form-label small fw-bold text-secondary mb-1 text-uppercase">Deposit Price</label>
          <app-input-field
            [control]="depositControl"
            type="currency"
            [decimalFormat]="{ integer: 12, decimal: 0 }"
            thousandSeparator="."
            decimalSeparator="," 
            [min]="0"
            [step]="100000"
            beforeInput="$"
            placeholder="0">
          </app-input-field>
        </div>
      </div>
      <div class="col-md-6 ps-md-4">
        <div class="mb-3">
          <label class="form-label small fw-bold text-secondary mb-1 text-uppercase">Area (m2)</label>
          <app-input-field
            [control]="areaControl"
            type="decimal"
            [decimalFormat]="{ integer: 6, decimal: 2 }"
            thousandSeparator="."
            decimalSeparator="," 
            [min]="0"
            afterInput="m²"
            placeholder="0">
          </app-input-field>
        </div>
        <div>
          <label class="form-label small fw-bold text-secondary mb-1 text-uppercase">Max People</label>
          <app-input-field
            [control]="peoplesControl"
            type="number"
            [min]="1"
            [step]="1"
            placeholder="1">
          </app-input-field>
        </div>
      </div>
    </section>

    <!-- Amenities -->
    <section>
      <h6 class="fw-bold mb-3 section-title">Tiện ích</h6>
      <div class="d-flex flex-wrap gap-2">
        <button *ngFor="let am of amenitiesList"
            class="btn btn-sm rounded-pill border d-inline-flex align-items-center gap-1 amenity-chip"
            [ngClass]="am.active ? 'btn-primary text-white border-primary' : 'bg-white text-secondary'"
            (click)="toggleAmenity(am)">
          <img *ngIf="am.iconUrl" [src]="am.iconUrl" width="16" height="16" [class.filter-white]="am.active" alt="icon">
          {{ am.label }}
        </button>
      </div>
    </section>

  </div>

  <!-- Action Buttons -->
  <div popup-footer class="d-flex w-100 gap-2">
    <button type="button" class="btn btn-light py-2 px-4 fw-semibold border rounded-3 text-secondary"
      (click)="close()">Cancel</button>
    <button type="button" class="btn btn-primary flex-grow-1 py-2 fw-bold text-uppercase rounded-3" (click)="submit()"
      [disabled]="isSubmitting || !isValidForm()">
      <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
      Tạo Bài Đăng
    </button>
  </div>

</app-popup>
